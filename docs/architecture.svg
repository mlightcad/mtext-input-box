<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120">
  <defs>
    <style>
      .title { font: 700 30px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .section { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .boxTitle { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #0b1220; }
      .boxText { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #24324a; }
      .label { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="1120" fill="#f8fafc" />
  <text x="70" y="65" class="title">Three.js Rich Text Editor Architecture (mtext-input-box)</text>
  <text x="70" y="95" class="small">Module relationships and responsibilities</text>

  <!-- External dependencies -->
  <rect x="70" y="130" width="1660" height="150" rx="12" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="90" y="160" class="section">External Dependencies</text>

  <rect x="110" y="180" width="280" height="80" rx="10" fill="#ffffff" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="130" y="205" class="boxTitle">@mlightcad/mtext-parser</text>
  <text x="130" y="226" class="boxText">Parses MTEXT into tokens/context.</text>
  <text x="130" y="244" class="boxText">Used to build editor AST model.</text>

  <rect x="430" y="180" width="320" height="80" rx="10" fill="#ffffff" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="450" y="205" class="boxTitle">@mlightcad/mtext-renderer</text>
  <text x="450" y="226" class="boxText">Renders MTEXT in Three.js.</text>
  <text x="450" y="244" class="boxText">Provides glyph layout metadata.</text>

  <rect x="790" y="180" width="220" height="80" rx="10" fill="#ffffff" stroke="#a5b4fc" filter="url(#shadow)"/>
  <text x="810" y="205" class="boxTitle">three.js</text>
  <text x="810" y="226" class="boxText">Scene, camera, raycasting,</text>
  <text x="810" y="244" class="boxText">and rendering context.</text>

  <!-- Main package -->
  <rect x="70" y="320" width="1020" height="500" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
  <text x="90" y="350" class="section">@mlightcad/mtext-input-box (Orchestration Layer)</text>

  <rect x="110" y="390" width="380" height="120" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="130" y="417" class="boxTitle">MTextInputBox</text>
  <text x="130" y="438" class="boxText">Central coordinator for model, renderer,</text>
  <text x="130" y="456" class="boxText">cursor, IME, toolbar, and history.</text>
  <text x="130" y="474" class="boxText">Public editor API used by app code.</text>

  <rect x="530" y="390" width="520" height="120" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="550" y="417" class="boxTitle">MTextDocument + AST Model</text>
  <text x="550" y="438" class="boxText">Source of truth for MTEXT content and style runs.</text>
  <text x="550" y="456" class="boxText">Supports parse/edit/serialize with transaction safety.</text>
  <text x="550" y="474" class="boxText">Maintains cursor and selection in document space.</text>

  <rect x="110" y="540" width="300" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="130" y="567" class="boxTitle">EditorUiAdapter</text>
  <text x="130" y="588" class="boxText">Maps key/command input to</text>
  <text x="130" y="606" class="boxText">document edit operations.</text>
  <text x="130" y="624" class="boxText">Tracks selection anchor semantics.</text>

  <rect x="440" y="540" width="300" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="460" y="567" class="boxTitle">Index Mapper</text>
  <text x="460" y="588" class="boxText">Converts document index &lt;-&gt;</text>
  <text x="460" y="606" class="boxText">logical visual cursor index.</text>
  <text x="460" y="624" class="boxText">Handles zero-span break nodes.</text>

  <rect x="770" y="540" width="280" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="790" y="567" class="boxTitle">Layout Extractor</text>
  <text x="790" y="588" class="boxText">Reads rendered object layout:</text>
  <text x="790" y="606" class="boxText">char boxes, line breaks, line heights.</text>
  <text x="790" y="624" class="boxText">Feeds cursor engine data.</text>

  <rect x="110" y="680" width="300" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="130" y="707" class="boxTitle">IME Bridge</text>
  <text x="130" y="728" class="boxText">Hidden textarea for composition input.</text>
  <text x="130" y="746" class="boxText">Projects caret to screen for IME UX.</text>

  <rect x="440" y="680" width="300" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="460" y="707" class="boxTitle">Toolbar UI</text>
  <text x="460" y="728" class="boxText">Floating HTML controls for format</text>
  <text x="460" y="746" class="boxText">(font, size, color, style, stack/script).</text>

  <rect x="770" y="680" width="280" height="110" rx="10" fill="#ffffff" stroke="#22d3ee" filter="url(#shadow)"/>
  <text x="790" y="707" class="boxTitle">History Manager</text>
  <text x="790" y="728" class="boxText">Undo/redo snapshots:</text>
  <text x="790" y="746" class="boxText">AST + selection + active format.</text>

  <!-- Cursor package -->
  <rect x="1130" y="320" width="600" height="500" rx="12" fill="#f0fdf4" stroke="#86efac"/>
  <text x="1150" y="350" class="section">@mlightcad/text-box-cursor (Cursor Subsystem)</text>

  <rect x="1160" y="390" width="540" height="140" rx="10" fill="#ffffff" stroke="#4ade80" filter="url(#shadow)"/>
  <text x="1180" y="417" class="boxTitle">TextBoxCursor</text>
  <text x="1180" y="438" class="boxText">Renderer-agnostic cursor logic engine.</text>
  <text x="1180" y="456" class="boxText">Computes line model, hit-test, movement, and selection.</text>
  <text x="1180" y="474" class="boxText">Consumes char boxes + line metadata from layout.</text>
  <text x="1180" y="492" class="boxText">Outputs caret state and selected ranges.</text>

  <rect x="1160" y="560" width="260" height="110" rx="10" fill="#ffffff" stroke="#4ade80" filter="url(#shadow)"/>
  <text x="1180" y="587" class="boxTitle">CursorRenderer</text>
  <text x="1180" y="608" class="boxText">Draws caret, selection highlight,</text>
  <text x="1180" y="626" class="boxText">and debug overlays.</text>

  <rect x="1440" y="560" width="260" height="110" rx="10" fill="#ffffff" stroke="#4ade80" filter="url(#shadow)"/>
  <text x="1460" y="587" class="boxTitle">ThreeJsRendererAdapter</text>
  <text x="1460" y="608" class="boxText">Adapter translating generic draw calls</text>
  <text x="1460" y="626" class="boxText">to Three.js primitives.</text>

  <!-- App/runtime -->
  <rect x="70" y="850" width="1660" height="190" rx="12" fill="#fff7ed" stroke="#fdba74"/>
  <text x="90" y="880" class="section">Application Runtime</text>

  <rect x="110" y="910" width="180" height="90" rx="10" fill="#ffffff" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="130" y="937" class="boxTitle">User Input</text>
  <text x="130" y="958" class="boxText">Keyboard, mouse, IME.</text>

  <rect x="310" y="910" width="230" height="90" rx="10" fill="#ffffff" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="330" y="937" class="boxTitle">Scene/Camera</text>
  <text x="330" y="958" class="boxText">World and view transforms.</text>

  <rect x="560" y="910" width="220" height="90" rx="10" fill="#ffffff" stroke="#fb923c" filter="url(#shadow)"/>
  <text x="580" y="937" class="boxTitle">Visual Output</text>
  <text x="580" y="958" class="boxText">Text + caret + selection.</text>

</svg>
